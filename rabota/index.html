<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 20px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      color: #222;
    }

    #cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      width: 280px;
    }

    .card-id {
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }

    .card-body {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Posts</h1>
  </div>

  <div id="cards"></div>

  <script src="script.js"></script>
</body>
</html>
